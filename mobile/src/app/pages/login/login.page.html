<ion-content class="ion-no-padding">
  <div class="login-wrapper">
    
    <!-- Top Brand Area -->
    <div class="brand-section">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" class="mini-logo">
        <defs>
          <clipPath id="drop-clip-login">
            <path d="M50,5 C50,5 90,45 90,70 A40,40 0 0,1 10,70 C10,45 50,5 50,5 Z" />
          </clipPath>
        </defs>
        <g clip-path="url(#drop-clip-login)">
          <rect x="-20" y="0" width="40" height="150" fill="#00B4D8" transform="rotate(-30 0 60)" />
          <rect x="20" y="-20" width="30" height="150" fill="#E040FB" transform="rotate(-30 20 60)" />
          <rect x="50" y="-40" width="30" height="150" fill="#FFD600" transform="rotate(-30 50 60)" />
          <rect x="80" y="-60" width="50" height="150" fill="#1A1A2E" transform="rotate(-30 80 60)" />
        </g>
      </svg>
      <h1 class="brand-name">Chapai</h1>
    </div>

    <!-- Bottom Interface Form Card -->
    <div class="form-container">
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        
        <div class="input-group">
          <ion-item lines="none" class="chapai-input-item">
            <ion-icon name="mail-outline" slot="start" color="medium"></ion-icon>
            <ion-input type="email" formControlName="email" placeholder="Email Address" mode="md"></ion-input>
          </ion-item>
          <div class="error-container" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid">
            <span *ngIf="loginForm.get('email')?.errors?.['required']">Email is required.</span>
            <span *ngIf="loginForm.get('email')?.errors?.['email']">Please enter a valid email.</span>
          </div>
        </div>

        <div class="input-group">
          <ion-item lines="none" class="chapai-input-item">
            <ion-icon name="lock-closed-outline" slot="start" color="medium"></ion-icon>
            <ion-input [type]="showPassword ? 'text' : 'password'" formControlName="password" placeholder="Password" mode="md"></ion-input>
            <ion-button fill="clear" slot="end" (click)="togglePasswordVisibility()" class="eye-btn" color="medium">
              <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
            </ion-button>
          </ion-item>
          <div class="error-container" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
            <span *ngIf="loginForm.get('password')?.errors?.['required']">Password is required.</span>
            <span *ngIf="loginForm.get('password')?.errors?.['minlength']">Password must be at least 6 characters.</span>
          </div>
        </div>

        <div class="forgot-link-wrapper">
          <a (click)="goToForgotPassword()" class="interactive-link">Forgot Password?</a>
        </div>

        <ion-button type="submit" expand="block" mode="ios" class="chapai-primary-btn">
          Sign In
        </ion-button>

      </form>

      <div class="footer-redirect">
        <p>Don't have an account? <a (click)="goToRegister()" class="cyan-link">Register</a></p>
      </div>
    </div>

  </div>
</ion-content>
