
<div class="page">
<div class="card">
<div class="login-container">

  <div class="login-card">

    <h2>Operator Login</h2>

    <input
      type="text"
      placeholder="Username"
      [(ngModel)]="username"
    />

    <input
      type="password"
      placeholder="Password"
      [(ngModel)]="password"
    />

    <button (click)="login()">Login</button>

  </div>

</div>
</div>
</div>
