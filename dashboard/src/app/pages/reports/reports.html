<h2 class="title">Reports Dashboard</h2>

<div class="grid">

  <div class="card total">
    <h3>Total Jobs</h3>
    <p>{{ totalJobs }}</p>
  </div>

  <div class="card pending">
    <h3>Pending</h3>
    <p>{{ pendingJobs }}</p>
  </div>

  <div class="card printing">
    <h3>Printing</h3>
    <p>{{ printingJobs }}</p>
  </div>

  <div class="card completed">
    <h3>Completed</h3>
    <p>{{ completedJobs }}</p>
  </div>

</div>
