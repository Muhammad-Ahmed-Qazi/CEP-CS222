<div class="operator-shell-layout">
  <!-- Fixed Left Sidebar -->
  <aside class="sidebar">
    <div class="brand-section">
      <div class="logo">
        <!-- Reusing the Chapai printer/page logo -->
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path>
        </svg>
        <span class="app-name">Chapai</span>
      </div>
      <span class="tagline">Operator Panel</span>
    </div>

    <div class="user-info" *ngIf="profile">
      <div class="avatar">{{ avatarInitials }}</div>
      <div class="details">
        <span class="name">{{ profile.firstName }} {{ profile.lastName }}</span>
        <div class="kiosk-status">
          <span *ngIf="profile.kioskId" class="status-badge active">{{ profile.locationName }}</span>
          <span *ngIf="!profile.kioskId" class="status-badge offline">No Kiosk</span>
        </div>
      </div>
    </div>

    <nav class="nav-menu">
      <a routerLink="/operator/queue" routerLinkActive="active" class="nav-link">
        <svg class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path>
        </svg>
        Queue Monitor
      </a>
      <a routerLink="/operator/handover" routerLinkActive="active" class="nav-link">
        <svg class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path>
        </svg>
        Handover Verification
      </a>
      <a routerLink="/operator/bins" routerLinkActive="active" class="nav-link">
        <svg class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
        </svg>
        My Bins
      </a>
      <a routerLink="/operator/profile" routerLinkActive="active" class="nav-link">
        <svg class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
        </svg>
        My Profile
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="logout-btn" (click)="onLogout()">
        <svg class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
        </svg>
        Sign Out Station
      </button>
    </div>
  </aside>

  <!-- Main Content Area -->
  <div class="main-content">
    <header class="topbar">
      <span class="panel-label">{{ pageTitle }}</span>
      <div class="status-matrix">
        <span class="clock">{{ currentTime }}</span>
        <div class="connectivity-wrapper">
          <span class="indicator-dot live" [class.dead]="!profile?.kioskId"></span>
          <span class="indicator-text">{{ profile?.kioskId ? 'Kiosk Connected' : 'Station Inactive' }}</span>
        </div>
      </div>
    </header>

    <main class="content-router">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
